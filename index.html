<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="description" content="Join Richard Gill on a Hot Dog World Tour! A photo gallery of hot dogs enjoyed in cities around the world, from Las Vegas to Berlin, Barcelona to Iceland.">
	<title>Richard Gill's Hot Dog World Tour</title>
	<link rel="canonical" href="https://www.richardgill.net/hotdogs.html">
	<meta http-equiv="content-language" content="en-GB">
	<!-- Critical CSS inlined to avoid render-blocking -->
	<style>
		*{margin:0;padding:0;box-sizing:border-box}
		body{font-family:system-ui,-apple-system,sans-serif;background:#1a1a1a;color:#fff;padding:2rem}
		header{text-align:center;margin-bottom:2rem}
		header img{max-width:300px;width:300px;height:auto;margin-bottom:1rem}
		header p{max-width:600px;margin:0 auto;font-size:1.1rem;line-height:1.6;color:#ccc}
		.masonry{columns:3;column-gap:1rem}
		.masonry-item{break-inside:avoid;margin-bottom:1rem;cursor:pointer;position:relative;overflow:hidden;border-radius:4px}
		.masonry-item img{width:100%;height:auto;display:block;border-radius:4px}
		.masonry-item.loading{background:#2a2a2a;min-height:200px}
		.masonry-item.loading img{opacity:0}
		.masonry-item.loading::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent);animation:shimmer 1.5s infinite}
		@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
		.masonry-item.loaded{background:none;min-height:0}
		@media(max-width:900px){.masonry{columns:2}}
		@media(max-width:500px){.masonry{columns:1}body{padding:1rem}}
		footer{text-align:center;margin-top:2rem;padding:1rem;color:#888;font-size:.9rem;line-height:1.6}
	</style>
	<!-- Preload LCP image so browser discovers it immediately -->
	<link rel="preload" href="images/amsterdam.webp" as="image" type="image/webp" fetchpriority="high">
	<link rel="preload" href="images/krakow.webp" as="image" type="image/webp" fetchpriority="high">
	<link rel="preload" href="images/Milan.webp" as="image" type="image/webp" fetchpriority="high">
	<!-- Full CSS loaded asynchronously to avoid render-blocking -->
	<link rel="preload" href="main.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
	<noscript><link rel="stylesheet" href="main.css"></noscript>
</head>
<body>
	<header role="banner">
		<img src="images/hotdoglogo.webp" alt="Hot Dog World Tour Logo" width="404" height="352" fetchpriority="high">
		<p>I love Hot Dogs! I hope you enjoy looking at my Hot Dogs from around the world as much as I have enjoyed traveling and eating them.</p>
	</header>

	<main role="main">
		<div class="masonry" id="gallery"></div>
	
		<!-- Lightbox -->
		<div class="lightbox" id="lightbox">
			<button class="lightbox-close" id="lightbox-close">&times;</button>
			<button class="lightbox-nav lightbox-prev" id="lightbox-prev">&#8249;</button>
			<button class="lightbox-nav lightbox-next" id="lightbox-next">&#8250;</button>
			<div class="lightbox-content">
				<img id="lightbox-img" src="" alt="">
				<div class="lightbox-info">
					<h2 id="lightbox-title"></h2>
					<p id="lightbox-desc"></p>
				</div>
			</div>
			<div class="lightbox-counter" id="lightbox-counter"></div>
		</div>
		
	</main>

	<footer role="contentinfo">
		<a href="map.html" style="display:inline-block;margin-top:0.75rem;color:#f44;text-decoration:none;font-size:0.95rem;">🗺️ View Interactive Map</a>
		<p>richardgill.net &copy;<span id="year">2026</span><br>
		Richard Gill's Hot Dog World Tour</p>
	</footer>

	<script src="images-data.js"></script>
	<script src="main.js" defer></script>
</body>
</html>
