<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="description" content="Interactive world map of Richard Gill's Hot Dog World Tour — explore every hot dog location around the globe.">
	<title>Hot Dog World Tour — Interactive Map</title>
	<meta http-equiv="content-language" content="en-GB">

	<!-- Leaflet CSS -->
	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
		integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
		crossorigin="">

	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }

		body {
			font-family: system-ui, -apple-system, sans-serif;
			background: #1a1a1a;
			color: #fff;
		}

		header {
			text-align: center;
			padding: 1.5rem 1rem 1rem;
			background: #1a1a1a;
			position: relative;
			z-index: 1;
		}

		header a {
			color: #fff;
			text-decoration: none;
		}

		header img {
			max-width: 200px;
			width: 200px;
			height: auto;
			margin-bottom: 0.5rem;
		}

		header p {
			max-width: 600px;
			margin: 0 auto;
			font-size: 1rem;
			line-height: 1.5;
			color: #ccc;
		}

		header .back-link {
			display: inline-block;
			margin-top: 0.75rem;
			color: #f44;
			text-decoration: none;
			font-size: 0.9rem;
		}

		header .back-link:hover {
			text-decoration: underline;
		}

		#map {
			width: 100%;
			height: calc(100vh - 180px);
			min-height: 400px;
			position: relative;
			z-index: 10;
		}

		footer {
			text-align: center;
			padding: 0.75rem;
			color: #888;
			font-size: 0.85rem;
			line-height: 1.5;
			background: #1a1a1a;
		}

		/* Custom marker styling */
		.hotdog-marker {
			background: none;
			border: none;
		}

		.hotdog-pin {
			width: 32px;
			height: 42px;
			position: relative;
			cursor: pointer;
			filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
			transition: transform 0.2s ease;
		}

		.hotdog-pin:hover {
			transform: scale(1.2);
		}

		.hotdog-pin svg {
			width: 100%;
			height: 100%;
		}

		/* Tooltip / popup image preview */
		.leaflet-tooltip.hotdog-tooltip {
			background: #222;
			border: 2px solid #f44;
			border-radius: 8px;
			padding: 6px;
			box-shadow: 0 4px 20px rgba(0,0,0,0.6);
			opacity: 1 !important;
			z-index: 10000 !important;
			max-width: 220px;
			overflow: hidden;
		}

		.leaflet-tooltip.hotdog-tooltip::before {
			border-top-color: #f44;
		}

		.tooltip-content {
			text-align: center;
			width: 200px;
			overflow: hidden;
		}

		.tooltip-content img {
			width: 200px;
			height: 150px;
			object-fit: cover;
			border-radius: 4px;
			display: block;
		}

		.tooltip-content h3 {
			margin-top: 6px;
			font-size: 0.85rem;
			color: #fff;
			font-weight: 600;
			width: 200px;
			text-wrap: wrap;
		}

		.tooltip-content p {
			font-size: 0.75rem;
			color: #aaa;
			margin-top: 2px;
			width: 200px;
			text-wrap: wrap;
			
		}

		/* Popup styling for click */
		.leaflet-popup-content-wrapper {
			background: #222 !important;
			color: #fff !important;
			border-radius: 8px !important;
			border: 2px solid #f44;
		}

		.leaflet-popup-tip {
			background: #222 !important;
			border: 1px solid #f44;
		}

		.leaflet-popup-close-button {
			color: #fff !important;
		}

		.leaflet-popup-close-button:hover {
			color: #f44 !important;
		}

		.popup-content {
			text-align: center;
		}

		.popup-content img {
			width: 280px;
			max-width: 100%;
			height: auto;
			border-radius: 4px;
			display: block;
			margin: 0 auto;
		}

		.popup-content h3 {
			margin-top: 8px;
			font-size: 1rem;
			color: #fff;
		}

		.popup-content p {
			font-size: 0.85rem;
			color: #aaa;
			margin-top: 4px;
		}

		/* Dark map tiles adjustments */
		.leaflet-container {
			background: #1a1a1a;
		}

		.leaflet-control-zoom a {
			background: #333 !important;
			color: #fff !important;
			border-color: #555 !important;
		}

		.leaflet-control-zoom a:hover {
			background: #444 !important;
		}

		.leaflet-control-attribution {
			background: rgba(26,26,26,0.8) !important;
			color: #666 !important;
		}

		.leaflet-control-attribution a {
			color: #888 !important;
		}

		@media (max-width: 600px) {
			header { padding: 1rem 0.75rem 0.75rem; }
			header img { max-width: 150px; width: 150px; }
			header p { font-size: 0.9rem; }
			#map { height: calc(100vh - 160px); }

			.tooltip-content img {
				width: 150px;
				height: 110px;
			}

			.popup-content img {
				width: 220px;
			}
		}
	</style>
</head>
<body>
	<header role="banner">
		<a href="index.html">
			<img src="images/hotdoglogo.webp" alt="Hot Dog World Tour Logo" width="404" height="352">
		</a>
		<p>Explore every hot dog location on the interactive map. Hover over a pin to preview, click for details.</p>
		<a href="index.html" class="back-link">&larr; Back to Gallery</a>
	</header>

	<div id="map"></div>

	<footer role="contentinfo">
		<p>richardgill.net &copy;<span id="year">2026</span> — Richard Gill's Hot Dog World Tour</p>
	</footer>

	<!-- Shared image data -->
	<script src="images-data.js"></script>

	<!-- Leaflet JS -->
	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
		integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
		crossorigin=""></script>

	<script>
		// ============================================================
		// MAP LOGIC — uses shared 'images' array from images-data.js
		// Only images with lat/lng coordinates are placed on the map.
		// ============================================================

		// Filter to only hotdogImages that have coordinates
		var locations = hotdogImages.filter(function (item) {
			return item.lat !== undefined && item.lng !== undefined;
		});

		// ============================================================
		// INITIALISE MAP
		// ============================================================
		var map = L.map('map', {
			center: [48, 5],
			zoom: 4,
			minZoom: 2,
			maxZoom: 18,
			zoomControl: true
		});

		// Dark-themed tile layer (CartoDB Dark Matter)
		L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
			attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
			subdomains: 'abcd',
			maxZoom: 20
		}).addTo(map);

		// ============================================================
		// CUSTOM PIN ICON (SVG hot dog pin)
		// ============================================================
		function createPinIcon() {
			return L.divIcon({
				className: 'hotdog-marker',
				html: '<div class="hotdog-pin">' +
					'<svg viewBox="0 0 32 42" xmlns="http://www.w3.org/2000/svg">' +
					'<path d="M16 0C7.16 0 0 7.16 0 16c0 12 16 26 16 26s16-14 16-26C32 7.16 24.84 0 16 0z" fill="#e53935"/>' +
					'<circle cx="16" cy="15" r="8" fill="#fff"/>' +
					'<text x="16" y="19" text-anchor="middle" font-size="12" fill="#e53935">🌭</text>' +
					'</svg>' +
					'</div>',
				iconSize: [32, 42],
				iconAnchor: [16, 42],
				tooltipAnchor: [0, -42],
				popupAnchor: [0, -42]
			});
		}

		// ============================================================
		// ADD MARKERS
		// ============================================================
		var markers = [];

		locations.forEach(function (loc) {
			var marker = L.marker([loc.lat, loc.lng], {
				icon: createPinIcon(),
				title: loc.title
			}).addTo(map);

			// Tooltip on hover — shows image preview
			var tooltipHtml =
				'<div class="tooltip-content">' +
				'<img src="images/' + loc.file + '" alt="' + loc.title + '" loading="lazy">' +
				'<h3>' + loc.title + '</h3>' +
				'<p>' + loc.description + '</p>' +
				'</div>';

			marker.bindTooltip(tooltipHtml, {
				className: 'hotdog-tooltip',
				direction: 'top',
				offset: [0, 0],
				opacity: 1
			});

			// Popup on click — shows larger image
			var popupHtml =
				'<div class="popup-content">' +
				'<img src="images/' + loc.file + '" alt="' + loc.title + '">' +
				'<h3>' + loc.title + '</h3>' +
				'<p>' + loc.description + '</p>' +
				'</div>';

			marker.bindPopup(popupHtml, {
				maxWidth: 320,
				minWidth: 200
			});

			markers.push(marker);
		});

		// Fit map to show all markers
		if (markers.length > 0) {
			var group = L.featureGroup(markers);
			map.fitBounds(group.getBounds().pad(0.3), {
				maxZoom: 5
			});
		}

		// Update copyright year
		var yearEl = document.getElementById('year');
		if (yearEl) yearEl.textContent = new Date().getFullYear();
	</script>
</body>
</html>
